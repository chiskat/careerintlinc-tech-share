kind: pipeline
name: default

workspace:
  path: /careerintlinc-tech-share

volumes:
  - name: webroot
    host:
      path: /root/www
  - name: pnpm-cache
    host:
      path: /root/.pnpm-cache

trigger:
  branch:
    - main

steps:
  - name: build
    image: chiskat/baseline-node20:2026.1.14
    volumes:
      - name: pnpm-cache
        path: /careerintlinc-tech-share/.pnpm-store
    commands:
      - pnpm i
      - pnpm build
    environment:
      HUSKY: 0

  - name: deploy-upload-cdn
    image: plugins/s3
    settings:
      endpoint:
        from_secret: S3_ENDPOINT
      region:
        from_secret: S3_REGION
      bucket:
        from_secret: S3_BUCKET_NAME
      access_key:
        from_secret: S3_ACCESS_KEY_ID
      secret_key:
        from_secret: S3_SECRET_ACCESS_KEY
      source: ./dist/**/*
      target: /careerintlinc-tech-share
      strip_prefix: dist

  - name: deploy
    image: alpine:3.20
    volumes:
      - name: webroot
        path: /webroot
    commands:
      - mkdir -p /webroot/careerintlinc-tech-share/
      - cp -rf ./dist/* /webroot/careerintlinc-tech-share/

