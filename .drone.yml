kind: pipeline
name: default

volumes:
  - name: webroot
    host:
      path: /root/container-config/www
  - name: pnpm-cache
    host:
      path: /root/container-cache/.pnpm-cache

trigger:
  branch:
    - main

steps:
  - name: restore-cache
    image: drillster/drone-volume-cache
    settings:
      restore: true
      mount:
        - /drone/src/.pnpm-store
    volumes:
      - name: pnpm-cache
        path: /cache

  - name: build
    image: chiskat/baseline-node24-alpine:2026.6.8
    commands:
      - pnpm i
      - pnpm build
    environment:
      HUSKY: 0

  - name: rebuild-cache
    image: drillster/drone-volume-cache
    settings:
      rebuild: true
      mount:
        - /drone/src/.pnpm-store
    volumes:
      - name: pnpm-cache
        path: /cache

  - name: deploy-sync-s3
    image: amazon/aws-cli
    environment:
      AWS_DEFAULT_REGION:
        from_secret: S3_REGION
      AWS_ACCESS_KEY_ID:
        from_secret: S3_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY:
        from_secret: S3_SECRET_ACCESS_KEY
      S3_BUCKET_NAME:
        from_secret: S3_BUCKET_NAME
      S3_ENDPOINT:
        from_secret: S3_ENDPOINT
    commands:
      - aws s3 sync ./dist s3://$S3_BUCKET_NAME/careerintlinc-tech-share --endpoint-url "$S3_ENDPOINT"

  - name: deploy
    image: alpine:3.20
    volumes:
      - name: webroot
        path: /webroot
    commands:
      - mkdir -p /webroot/careerintlinc-tech-share/
      - cp -rf ./dist/* /webroot/careerintlinc-tech-share/
